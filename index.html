<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te Amo Mi Princesa ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#2a0035,#12001d,#000);
font-family:Arial,Helvetica,sans-serif;
}

canvas{
position:fixed;
inset:0;
z-index:0;
}

.contenedor{
position:relative;
z-index:10;
text-align:center;
padding:20px;
}

h1{
color:#ff5fa2;
font-size:3rem;
text-shadow:0 0 15px #ff2e88,0 0 35px #ff2e88;
margin-bottom:20px;
}

.corazon{
font-size:120px;
animation:latido 1.2s infinite;
cursor:pointer;
filter:drop-shadow(0 0 25px #ff0044);
user-select:none;
}

@keyframes latido{
0%,100%{transform:scale(1);}
50%{transform:scale(1.18);}
}

button{
margin-top:25px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:40px;
background:#ff2e74;
color:white;
cursor:pointer;
box-shadow:0 0 20px #ff2e74;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

#mensaje{
margin-top:30px;
font-size:22px;
color:white;
display:none;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>

</head>

<body>

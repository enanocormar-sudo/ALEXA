<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te Amo Mi Princesa ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#2a0035,#12001d,#000);
font-family:Arial,Helvetica,sans-serif;
}

canvas{
position:fixed;
inset:0;
z-index:0;
}

.contenedor{
position:relative;
z-index:10;
text-align:center;
padding:20px;
}

h1{
color:#ff5fa2;
font-size:3rem;
text-shadow:0 0 15px #ff2e88,0 0 35px #ff2e88;
margin-bottom:20px;
}

.corazon{
font-size:120px;
animation:latido 1.2s infinite;
cursor:pointer;
filter:drop-shadow(0 0 25px #ff0044);
user-select:none;
}

@keyframes latido{
0%,100%{transform:scale(1);}
50%{transform:scale(1.18);}
}

button{
margin-top:25px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:40px;
background:#ff2e74;
color:white;
cursor:pointer;
box-shadow:0 0 20px #ff2e74;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

#mensaje{
margin-top:30px;
font-size:22px;
color:white;
display:none;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>

</head>

<body>

<canvas id="estrellas"></canvas>

<div class="contenedor">

<h1>❤️ Te Amo Mi Princesa ❤️</h1>

<div class="corazon" onclick="iniciar()">
❤️
</div>
  <div class="galeria">

<img src="img/foto1.jpg" class="foto f1">
<img src="img/foto2.jpg" class="foto f2">
<img src="img/foto3.jpg" class="foto f3">
<img src="img/foto4.jpg" class="foto f4">
<img src="img/foto5.jpg" class="foto f5">
<img src="img/foto6.jpg" class="foto f6">
<img src="img/foto7.jpg" class="foto f7">
<img src="img/foto8.jpg" class="foto f8">
<img src="img/foto9.jpg" class="foto f9">

  </div>

<button onclick="iniciar()">
Toca mi corazón
</button>

<div id="mensaje">
✨ Bienvenida mi princesa... ✨
</div>

</div>

<script>

function iniciar(){
document.getElementById("mensaje").style.display="block";
}

// Fondo de estrellas
const canvas=document.getElementById("estrellas");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const estrellas=[];

for(let i=0;i<180;i++){
estrellas.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
v:0.2+Math.random()*0.8
});
}

function animar(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

for(const e of estrellas){

ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fill();

e.y+=e.v;

if(e.y>canvas.height){
e.y=0;
e.x=Math.random()*canvas.width;
}

}

requestAnimationFrame(animar);

}

animar();

</script>

</body>
</html>
